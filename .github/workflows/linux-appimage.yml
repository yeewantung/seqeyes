name: Linux AppImage

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-appimage:
    uses: ./.github/workflows/_appimage-build.yml

  upload-release:
    if: github.event_name == 'release'
    needs: build-appimage
    runs-on: ubuntu-22.04
    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-appimage
          path: .

      - name: Upload AppImage to Release
        run: |
          cp seqeyes-x86_64.AppImage "seqeyes-${{ github.event.release.tag_name }}-x86_64.AppImage"

      - name: Upload Versioned AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          files: seqeyes-${{ github.event.release.tag_name }}-x86_64.AppImage
