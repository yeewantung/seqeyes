name: Build & Validate (Windows + Linux)

on:
  push:
    paths-ignore:
      - "**.md"
      - "doc/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "doc/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  build_windows:
    uses: ./.github/workflows/_windows-build.yml

  build_linux:
    uses: ./.github/workflows/_appimage-build.yml

  visual_regression:
    needs: build_windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Runtime Zip
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-ci-runtime
          path: .

      - name: Extract Runtime
        shell: pwsh
        run: |
          Expand-Archive -Path seqeyes-ci-runtime.zip -DestinationPath runtime -Force

      - name: Setup Python Dependencies
        run: pip install Pillow gdown pyyaml

      - name: Download Baseline Folder from Google Drive
        env:
          GDRIVE_BASELINE_FOLDER_ID: "1Lhbd8zXQlI6z_o0f6HQPDb1umb_zLush"
        run: |
          mkdir test/baselines -ErrorAction SilentlyContinue
          mkdir test/baseline_downloads -ErrorAction SilentlyContinue
          gdown --folder "https://drive.google.com/drive/folders/$env:GDRIVE_BASELINE_FOLDER_ID" -O test/baseline_downloads/
          $visual = Get-ChildItem -Path test/baseline_downloads -Recurse -File | Where-Object { $_.Name -match '^traj-seq-pngs(\.zip)?$' -or $_.Name -match '^traj-seq-pngs.*\.zip$' } | Select-Object -First 1
          if (-not $visual) {
            Write-Error "Cannot find visual baseline zip named like 'traj-seq-pngs' in downloaded folder."
            exit 1
          }
          Copy-Item -Path $visual.FullName -Destination test/visual-baselines.zip -Force
          python -c "import zipfile; zipfile.ZipFile('test/visual-baselines.zip').extractall('test/baselines')"

      - name: Run Visual Regression Test
        run: |
          python test/test_visual_regression.py --bin-dir runtime/seqeyes --threshold 0.005 --changed-threshold 0.0001

      - name: Upload Visual Diff Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            test/snapshots/*_baseline.png
            test/snapshots/*_current.png
            test/snapshots/*_diff.png

  trajectory_regression:
    needs: build_windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Runtime Zip
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-ci-runtime
          path: .

      - name: Extract Runtime
        shell: pwsh
        run: |
          Expand-Archive -Path seqeyes-ci-runtime.zip -DestinationPath runtime -Force

      - name: Setup Python Dependencies
        run: pip install gdown pyyaml

      - name: Download Baseline Folder from Google Drive
        env:
          GDRIVE_BASELINE_FOLDER_ID: "1Lhbd8zXQlI6z_o0f6HQPDb1umb_zLush"
        run: |
          mkdir test/trajectory_baselines -ErrorAction SilentlyContinue
          mkdir test/baseline_downloads -ErrorAction SilentlyContinue
          gdown --folder "https://drive.google.com/drive/folders/$env:GDRIVE_BASELINE_FOLDER_ID" -O test/baseline_downloads/
          $traj = Get-ChildItem -Path test/baseline_downloads -Recurse -File | Where-Object { $_.Name -match '^traj-txt(\.zip)?$' -or $_.Name -match '^traj-txt.*\.zip$' } | Select-Object -First 1
          if (-not $traj) {
            Write-Error "Cannot find trajectory baseline zip named like 'traj-txt' in downloaded folder."
            exit 1
          }
          Copy-Item -Path $traj.FullName -Destination test/trajectory-baselines.zip -Force
          python -c "import zipfile; zipfile.ZipFile('test/trajectory-baselines.zip').extractall('test/trajectory_baselines')"

      - name: Run Trajectory Baseline Regression
        run: |
          python test/tools/check_trajectory_against_baseline.py --bin-dir runtime/seqeyes --cases test/trajectory_regression_cases.yaml --baseline-root test/trajectory_baselines --out-dir test/trajectory_regression_ci_out

  headless_load:
    needs: build_windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Runtime Zip
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-ci-runtime
          path: .

      - name: Extract Runtime
        shell: pwsh
        run: |
          Expand-Archive -Path seqeyes-ci-runtime.zip -DestinationPath runtime -Force

      - name: Run Headless Load Test
        run: python test/test_load_all.py --bin-dir runtime/seqeyes

      - name: Upload Headless Markers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-load-markers
          path: test/headless_markers
          if-no-files-found: warn

  performance:
    needs: build_windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Runtime Zip
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-ci-runtime
          path: .

      - name: Extract Runtime
        shell: pwsh
        run: |
          Expand-Archive -Path seqeyes-ci-runtime.zip -DestinationPath runtime -Force

      - name: Run Performance Test
        run: |
          python test/test_perf_zoom.py --bin-dir runtime/seqeyes --github-benchmark-out test/perf_bench.json --repeat 5 --warmup

  package_windows_artifact:
    needs: [build_windows, visual_regression, trajectory_regression, headless_load, performance]
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Download Runtime Zip
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-ci-runtime
          path: .

      - name: Create CI Windows Package
        shell: pwsh
        run: |
          Copy-Item -Path seqeyes-ci-runtime.zip -Destination seqeyes-latest-win64.zip -Force

      - name: Upload Windows CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-latest-win64
          path: seqeyes-latest-win64.zip

  cleanup_internal_artifacts:
    if: ${{ always() }}
    needs: [build_windows, build_linux, visual_regression, trajectory_regression, headless_load, performance, package_windows_artifact]
    runs-on: windows-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete Internal Runtime Artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $runId = "${{ github.run_id }}"
          $ids = gh api "repos/$repo/actions/runs/$runId/artifacts" --paginate --jq '.artifacts[] | select(.name=="seqeyes-ci-runtime") | .id'
          if (-not $ids) {
            Write-Host "No internal runtime artifact found to delete."
            exit 0
          }
          foreach ($id in $ids) {
            gh api -X DELETE "repos/$repo/actions/artifacts/$id"
            Write-Host "Deleted internal artifact id=$id"
          }
