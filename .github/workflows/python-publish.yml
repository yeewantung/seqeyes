name: Python Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish: pypi or testpypi"
        type: choice
        required: true
        default: "testpypi"
        options:
          - testpypi
          - pypi

jobs:
  build-wheels:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            plat_name: win_amd64
          - os: macos-latest
            qt_arch: clang_64
            plat_name: macosx_11_0_arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive TestPyPI version
        if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
        shell: bash
        run: |
          latest_tag="$(git describe --tags --abbrev=0 --match 'v*')"
          base_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$base_version"
          next_patch=$((patch + 1))
          pretend_version="${major}.${minor}.${next_patch}.dev${GITHUB_RUN_NUMBER}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=${pretend_version}" >> "$GITHUB_ENV"
          echo "Using TestPyPI version: ${pretend_version}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---- Qt ----
      - name: Install Qt 6.5.3
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: ${{ matrix.qt_arch }}
          cache: true

      # ---- MSVC (Windows only) ----
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---- Clean stale build artifacts (prevents moc version mismatch) ----
      - name: Clean build directories
        shell: bash
        run: rm -rf _cmake_build seqeyes_autogen

      # ---- Build & install the seqeyes C++ binary into python/seqeyes/bin/ ----
      - name: Configure (CMake)
        run: >
          cmake -S . -B _cmake_build
          -DCMAKE_BUILD_TYPE=Release
          -DSEQEYES_BUILD_TESTS=OFF
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/python"

      - name: Build (CMake)
        run: cmake --build _cmake_build --config Release

      - name: Install binary into package tree
        run: cmake --install _cmake_build --config Release

      - name: Verify macOS app bundle linkage
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP="python/seqeyes/bin/seqeyes.app/Contents/MacOS/seqeyes"
          test -x "$APP"
          test -d "python/seqeyes/bin/seqeyes.app/Contents/Frameworks"
          otool -l "$APP" | grep -A2 LC_RPATH
          otool -L "$APP"

      # ---- Build Python wheel (pure setuptools, binary now present) ----
      - name: Build wheel
        shell: bash
        run: |
          pip install build
          if [ -n "${{ matrix.plat_name }}" ]; then
            python -m build --wheel --outdir wheelhouse --config-setting="--build-option=--plat-name=${{ matrix.plat_name }}"
          else
            python -m build --wheel --outdir wheelhouse
          fi

      # ---- Repair wheel: bundle Qt shared libraries ----
      - name: Copy wheel (macOS — skip delocate)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          cp wheelhouse/*.whl dist/

      - name: Copy wheel (Windows 鈥?windeployqt already ran via cmake install)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item wheelhouse\*.whl dist\

      # ---- Upload ----
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/seqeyes/
    permissions:
      id-token: write
    env:
      PUBLISH_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target || 'pypi' }}

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ env.PUBLISH_TARGET == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          # TODO: finalize by parent repo owner 鈥?configure PyPI trusted publisher
          # or set the PYPI_API_TOKEN secret in repo settings.
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true


